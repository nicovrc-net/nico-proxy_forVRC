# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "v3", "v3-niconico" ]
    tags: ['3.*']
  pull_request:
    branches: [ "master","v3", "v3-niconico" ]

jobs:
  build-21:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3.5.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew shadowJar

      - name: Upload JarFile
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: ./build/libs/NicoVideoPlayForVRC-3.0-SNAPSHOT-all.jar

  build-24:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3.5.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle Wrapper
        run: ./gradlew shadowJar

  download_ffmpeg:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download ffmpeg
        run: |
          wget https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz > null
          tar -Jxvf ./ffmpeg-master-latest-linux64-gpl.tar.xz > null
          cp ./ffmpeg-master-latest-linux64-gpl/bin/* ./
          rm ./ffmpeg-master-latest-linux64-gpl.tar.xz
          rm ./ffmpeg-master-latest-linux64-gpl -fr
        shell: bash

      - name: Upload ffmpeg
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg
          path: ./ffmpeg

  download_errorVideo:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download Video
        run: |
          wget https://nicovrc.net/v3-video/error_404.mp4 > null
          wget https://nicovrc.net/v3-video/error_000.mp4 > null
          wget https://nicovrc.net/v3-video/error_404_2.mp4 > null
        shell: bash

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: ./*.mp4

  build_br:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Build brotli
        run: |
          git clone https://github.com/google/brotli.git
          cd brotli
          mkdir out && cd out
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=./installed ..
          cmake --build . --config Release --target install
        shell: bash

      - name: Upload brotli
        uses: actions/upload-artifact@v4
        with:
          name: brotli
          path: ./brotli/out/brotli

  autotest1:
    needs: [build-21, build_br]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JarFile
        uses: actions/download-artifact@v4
        with:
          name: jar

      - name: Download brotli File
        uses: actions/download-artifact@v4
        with:
          name: brotli

      - name: Run the Application
        run: java -jar ./NicoVideoPlayForVRC-3.0-SNAPSHOT-all.jar &
        shell: bash

      - name: Wait for the application to start
        run: sleep 1

      - name: Create config.yml Test
        run: |
          if [ -f ./config.yml ]; then
            echo "OK"
          else 
            exit 1
          fi
        shell: bash

  autotest2:
    needs: [build-21, build_br]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
