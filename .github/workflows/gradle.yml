      - name: URL Request Test (Error)
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{content_type}" http://localhost:25252/?vi=https://www.nicovideo.jp/watch/sm1)
          if [ "$HTTP_STATUS" -ne "video/mp4" ]; then
